version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: writ-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: writ
      POSTGRES_PASSWORD: writ_password
      POSTGRES_DB: writ_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    ports:
      - '5432:5432'

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: writ-server
    restart: unless-stopped
    environment:
      WRIT_USER: writ
      WRIT_PASSWORD: writ_password
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: writ_db
    depends_on:
      - postgres
    ports:
      - '5000:5000'
    volumes:
      - ./server:/app

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: writ-client
    restart: unless-stopped
    ports:
      - '3000:3000'
    depends_on:
      - server
    environment:
      - NODE_ENV=production

volumes:
  postgres_data:
